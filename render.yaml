# Render Configuration for Multi-Tenant System
# This file should be named render.yaml in your project root

services:
  - type: web
    name: multitenant-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --log-level info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY_SUPERADMIN
        sync: false
      - key: SECRET_KEY_TENANT
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CRON_SECRET
        sync: false

cron:
  # Monthly billing emails - runs on 1st of every month at midnight UTC
  - name: monthly-bulk-billing-emails
    schedule: "0 0 1 * *"
    command: |
      curl -X POST https://YOUR_APP_NAME.onrender.com/api/v1/billing/cron/bulk-billing-emails \
      -H "Authorization: Bearer $CRON_SECRET" \
      -H "Content-Type: application/json"
    
  # Alternative: Weekly billing check (every Monday at midnight)
  # - name: weekly-billing-check
  #   schedule: "0 0 * * 1"
